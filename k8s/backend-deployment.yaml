apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: vignesh0777/mean-backend:latest
        ports:
        - containerPort: 8080
        env:
        - name: MONGO_URL
          value: mongodb://mongodb:27017/dd_db
